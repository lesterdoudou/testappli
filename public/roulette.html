<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Roulette Avis - Client</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  </head>
  <body class="page">
    <main class="shell">
      <header class="hero">
        <span class="pill">Roulette client</span>
        <div class="brand-row">
          <img id="brand-logo-client" class="brand-logo hidden" alt="Logo enseigne" />
          <h1 id="restaurant-title">Chargement...</h1>
        </div>
        <p>Laissez un avis Google, puis tentez votre chance.</p>
      </header>

      <section class="grid">
        <div class="card">
          <h2>Etape 1 - Avis Google</h2>
          <p>Un avis = une chance de tourner la roue.</p>
          <a id="review-link" class="btn" href="#" target="_blank" rel="noopener">Laisser un avis pour obtenir ma recompense</a>
          <div class="toggle review-toggle">
            <button id="review-yes" type="button">Avis laisse</button>
            <button id="review-no" type="button">Pas encore</button>
          </div>
          <label>
            Prenom
            <input id="customer-name" type="text" placeholder="Votre prenom" />
          </label>
        </div>

        <div class="card">
          <h2>Etape 2 - Validation</h2>
          <div class="wheel-wrap">
            <canvas id="wheel" width="320" height="320"></canvas>
            <div class="pointer"></div>
          </div>
          <button id="spin-btn" class="btn" type="button">Demander la validation</button>
          <p id="spin-result" class="result"></p>
        </div>
      </section>

      <section class="card">
        <h2>A savoir</h2>
        <p class="muted">Le commercant valide votre demande apres avoir vu l'avis.</p>
      </section>
    </main>
    <footer class="site-footer">© <a href="https://beeastar.fr" target="_blank" rel="noopener">BeeAStar.fr</a></footer>

    <script src="/roulette.js"></script>
  </body>
</html>
