<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Roulette Avis - Connexion</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body class="page">
    <main class="shell">
      <header class="hero">
        <span class="pill">Connexion enseigne</span>
        <h1>Acceder a votre dashboard</h1>
        <p>Utilisez l'email et le mot de passe crees a l'inscription.</p>
      </header>

      <section class="card">
        <h2>Connexion</h2>
        <form id="login-form" class="form">
          <label>
            Email
            <input name="email" type="email" placeholder="contact@entreprise.com" required />
          </label>
          <label>
            Mot de passe
            <input name="password" type="password" required />
          </label>
          <button class="btn" type="submit">Se connecter</button>
          <p id="login-error" class="muted"></p>
        </form>
        <div class="divider"></div>
        <div class="link-list">
          <div>
            <span>Nouvelle enseigne ?</span>
            <a href="/">Creer un compte</a>
          </div>
        </div>
      </section>
    </main>
    <footer class="site-footer">© BeeAStar.fr</footer>

    <script src="/login.js"></script>
  </body>
</html>
